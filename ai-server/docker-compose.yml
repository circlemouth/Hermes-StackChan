services:
  ai-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
      - "8766:8766"
    env_file: .env
    environment:
      - HERMES_ROOT=/hermes-agent
      - HERMES_PYTHON=python3
      - STACKCHAN_CONTROL_HOST=0.0.0.0
    volumes:
      - ../hermes-agent:/hermes-agent:ro
      - ~/.hermes:/root/.hermes
    restart: unless-stopped
